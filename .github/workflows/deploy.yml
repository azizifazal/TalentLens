name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

permissions:
  id-token: write
  contents: read

jobs:
  test-before-deploy:
    name: Run Full Test Suite
    uses: ./.github/workflows/ci.yml

  deploy-infrastructure:
    name: Deploy AWS Infrastructure
    runs-on: ubuntu-latest
    needs: test-before-deploy
    environment: ${{ github.event.inputs.environment || 'production' }}
    defaults:
      run:
        working-directory: infra
    env:
      CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
      CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
    outputs:
      api_function_url: ${{ steps.outputs.outputs.api_function_url }}
      user_pool_id: ${{ steps.outputs.outputs.user_pool_id }}
      user_pool_client_id: ${{ steps.outputs.outputs.user_pool_client_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: infra/requirements.txt

      - name: Install CDK dependencies
        run: pip install -r requirements.txt

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk@2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: CDK Bootstrap (idempotent)
        run: cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: CDK Deploy — Auth Stack
        run: cdk deploy TalentLensAuthStack --require-approval never --outputs-file auth-outputs.json

      - name: CDK Deploy — Storage Stack
        run: cdk deploy TalentLensStorageStack --require-approval never --outputs-file storage-outputs.json

      - name: CDK Deploy — Compute Stack
        run: |
          cdk deploy TalentLensComputeStack --require-approval never \
            --outputs-file compute-outputs.json \
            -c allowed_origins="${{ secrets.FRONTEND_URL }}"

      - name: Extract stack outputs
        id: outputs
        run: |
          API_URL=$(jq -r '.TalentLensComputeStack.ApiFunctionUrl' compute-outputs.json)
          POOL_ID=$(jq -r '.TalentLensAuthStack.UserPoolId' auth-outputs.json)
          CLIENT_ID=$(jq -r '.TalentLensAuthStack.UserPoolClientId' auth-outputs.json)
          echo "api_function_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "user_pool_id=$POOL_ID" >> "$GITHUB_OUTPUT"
          echo "user_pool_client_id=$CLIENT_ID" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ needs.deploy-infrastructure.outputs.api_function_url }}
          VITE_COGNITO_USER_POOL_ID: ${{ needs.deploy-infrastructure.outputs.user_pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ needs.deploy-infrastructure.outputs.user_pool_client_id }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Deploy to S3 + invalidate CloudFront
        run: |
          aws s3 sync dist/ s3://${{ secrets.FRONTEND_BUCKET_NAME }} --delete
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            aws cloudfront create-invalidation \
              --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
              --paths "/*"
          fi
